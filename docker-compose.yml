services:
  redis:
    image: redis:7.4-alpine
    container_name: ftg-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${FTG_REDIS_PORT:-16379}:6379"
    cpuset: "0"
    networks:
      - ftg-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  screener:
    build: ./screener
    container_name: ftg-screener
    environment:
      REDIS_ADDR: redis:6379
      BYBIT_BASE_URL: ${BYBIT_BASE_URL:-https://api.bybit.com}
      SCREEN_INTERVAL: ${SCREEN_INTERVAL:-1h}
      MIN_TURNOVER_24H: "${MIN_TURNOVER_24H:-5000000}"
      MAX_FUNDING_RATE: "${MAX_FUNDING_RATE:-0.005}"
      MIN_FUNDING_RATE: "${MIN_FUNDING_RATE:--0.005}"
      BLACKLIST_SYMBOLS: ${BLACKLIST_SYMBOLS:-BSBUSDT}
      METRICS_ADDR: ":9100"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ftg-net
    restart: unless-stopped

  data_ingestion:
    build: ./data_ingestion
    container_name: ftg-ingestion
    environment:
      REDIS_ADDR: redis:6379
      BYBIT_WS_URL: ${BYBIT_WS_URL:-wss://stream.bybit.com/v5/public/linear}
      USE_MSGPACK: "true"
      METRICS_ADDR: ":9101"
    depends_on:
      redis:
        condition: service_healthy
      screener:
        condition: service_started
    cpuset: "1"
    networks:
      - ftg-net
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: ftg-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-adminpassword}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-fasttrader}
      DOCKER_INFLUXDB_INIT_BUCKET: market_raw
      DOCKER_INFLUXDB_INIT_RETENTION: 336h
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-ftg-super-secret-token-change-me}
    volumes:
      - influx_data:/var/lib/influxdb2
      - influx_config:/etc/influxdb2
    ports:
      - "${FTG_INFLUX_PORT:-18086}:8086"
    networks:
      - ftg-net
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  influx_init:
    image: influxdb:2.7
    container_name: ftg-influx-init
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      INFLUX_HOST: http://influxdb:8086
      INFLUX_ORG: ${INFLUX_ORG:-fasttrader}
      INFLUX_TOKEN: ${INFLUX_TOKEN:-ftg-super-secret-token-change-me}
    volumes:
      - ./influxdb/init:/init:ro
    entrypoint: ["/bin/sh", "/init/01-buckets.sh"]
    networks:
      - ftg-net
    restart: "no"

  history_logger:
    build: ./history_logger
    container_name: ftg-history-logger
    environment:
      REDIS_ADDR: redis:6379
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN:-ftg-super-secret-token-change-me}
      INFLUX_ORG: ${INFLUX_ORG:-fasttrader}
      INFLUX_BUCKET_RAW: market_raw
      BATCH_FLUSH_EVERY: 5s
      BATCH_MAX_POINTS: "10000"
      ORDERBOOK_DEPTH: "50"
      METRICS_ADDR: ":9104"
    depends_on:
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      influx_init:
        condition: service_completed_successfully
      data_ingestion:
        condition: service_started
    cpuset: "7"
    networks:
      - ftg-net
    restart: unless-stopped

  ml_engine:
    build: ./ml_engine
    container_name: ftg-ml-engine
    gpus: all
    environment:
      REDIS_ADDR: redis:6379
      MODEL_DIR: /app/models
      FAISS_PATH: /app/data/faiss_index
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.85}
      LONG_CONFIDENCE_THRESHOLD: ${LONG_CONFIDENCE_THRESHOLD:-0.50}
      KILL_CONFIDENCE_THRESHOLD: ${KILL_CONFIDENCE_THRESHOLD:-0.35}
      ENTRY_ABORT_THRESHOLD: ${ENTRY_ABORT_THRESHOLD:-0.50}
      ADVERSE_CONFIRM_TICKS: ${ADVERSE_CONFIRM_TICKS:-3}
      DECAY_OBI_THRESHOLD: ${DECAY_OBI_THRESHOLD:-0.30}
      MAX_SIGNAL_CONFIDENCE: ${MAX_SIGNAL_CONFIDENCE:-0.98}
      BLACKLIST_SYMBOLS: ${BLACKLIST_SYMBOLS:-BSBUSDT}
      POSITIONS_CHANNEL: ${POSITIONS_CHANNEL:-execution:positions}
      PENDING_ORDERS_CHANNEL: ${PENDING_ORDERS_CHANNEL:-execution:pending_orders}
      CORRELATION_THRESHOLD: ${CORRELATION_THRESHOLD:-0.85}
      VOL_MULTIPLIER_CAP: ${VOL_MULTIPLIER_CAP:-2.0}
      MIN_TP_PCT: ${MIN_TP_PCT:-0.002}
      MAX_TP_PCT: ${MAX_TP_PCT:-0.008}
      FEE_BREAKEVEN_PCT: ${FEE_BREAKEVEN_PCT:-0.0015}
      ENTRY_MAKER_TICKS: ${ENTRY_MAKER_TICKS:-2}
      MEMORY_DECAY_DAYS: ${MEMORY_DECAY_DAYS:-14}
      METRICS_ADDR: ":9103"
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN:-ftg-super-secret-token-change-me}
      INFLUX_ORG: ${INFLUX_ORG:-fasttrader}
      INFLUX_BUCKET_FEATURES: market_features
      INFLUX_BUCKET_RAW: market_raw
      MODEL_RELOAD_CHANNEL: models:reload
      MODEL_WATCH_INTERVAL_SEC: "10"
      RETRAIN_INTERVAL_HOURS: ${RETRAIN_INTERVAL_HOURS:-2}
      RETRAIN_TRADE_THRESHOLD: ${RETRAIN_TRADE_THRESHOLD:-100}
      RETRAIN_LOOKBACK_HOURS: ${RETRAIN_LOOKBACK_HOURS:-24}
      RETRAIN_EPOCHS: ${RETRAIN_EPOCHS:-12}
      RETRAIN_TIMEOUT_SEC: ${RETRAIN_TIMEOUT_SEC:-3600}
      RETRAIN_MIN_VAL_ACC: ${RETRAIN_MIN_VAL_ACC:-0.25}
      TRAIN_NICE_LEVEL: ${TRAIN_NICE_LEVEL:-15}
      TRAIN_DEVICE: ${TRAIN_DEVICE:-cuda}
      TELEMETRY_INTERVAL_SEC: ${TELEMETRY_INTERVAL_SEC:-5}
      MOVEMENT_PROB_FUNDING_PRIOR_SCALE: ${MOVEMENT_PROB_FUNDING_PRIOR_SCALE:-50}
      MOVEMENT_PROB_WEIGHTS: ${MOVEMENT_PROB_WEIGHTS:-}
      MOVEMENT_PROB_BIAS: ${MOVEMENT_PROB_BIAS:-}
      LOSS_PENALTY_WEIGHT: ${LOSS_PENALTY_WEIGHT:-2.5}
      RETRAIN_DEFAULT_SYMBOLS: ${RETRAIN_DEFAULT_SYMBOLS:-BTCUSDT,ETHUSDT}
      PATTERN_SIMILARITY_THRESHOLD: ${PATTERN_SIMILARITY_THRESHOLD:-0.92}
      HEALTH_PORT: "10103"
      NVIDIA_VISIBLE_DEVICES: all
      ORT_DISABLE_CPU_AFFINITY: "1"
      ORT_INTRA_OP_THREADS: ${ORT_INTRA_OP_THREADS:-4}
      ORT_INTER_OP_THREADS: ${ORT_INTER_OP_THREADS:-2}
    volumes:
      - ml_data:/app/data
      - ml_models:/app/models
    depends_on:
      redis:
        condition: service_healthy
      data_ingestion:
        condition: service_started
      influxdb:
        condition: service_healthy
    ports:
      - "10103:10103"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:10103/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    cpuset: "3-6"
    networks:
      - ftg-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  oms_execution:
    build: ./oms_execution
    container_name: ftg-oms
    environment:
      REDIS_ADDR: redis:6379
      BYBIT_BASE_URL: ${BYBIT_BASE_URL:-https://api.bybit.com}
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_DEMO: ${BYBIT_DEMO:-false}
      BYBIT_TESTNET: ${BYBIT_TESTNET:-false}
      ACCOUNT_DEPOSIT_USD: ${ACCOUNT_DEPOSIT_USD:-100}
      TRADE_MARGIN_USD: ${TRADE_MARGIN_USD:-10}
      LEVERAGE: ${LEVERAGE:-5}
      DEFAULT_ORDER_QTY: ${DEFAULT_ORDER_QTY:-0.01}
      TIME_STOP_SECONDS: ${TIME_STOP_SECONDS:-3600}
      PARTIAL_CLOSE_PCT: ${PARTIAL_CLOSE_PCT:-0.45}
      ORDER_FILL_TIMEOUT_SEC: ${ORDER_FILL_TIMEOUT_SEC:-3600}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.65}
      KILL_CONFIDENCE_THRESHOLD: ${KILL_CONFIDENCE_THRESHOLD:-0.35}
      POSITIONS_CHANNEL: ${POSITIONS_CHANNEL:-execution:positions}
      PENDING_ORDERS_CHANNEL: ${PENDING_ORDERS_CHANNEL:-execution:pending_orders}
      ENTRY_REPRICE_THRESHOLD_PCT: ${ENTRY_REPRICE_THRESHOLD_PCT:-0.004}
      EXIT_REPRICE_THRESHOLD_PCT: ${EXIT_REPRICE_THRESHOLD_PCT:-0.003}
      STALE_ENTRY_MOVE_AWAY_PCT: ${STALE_ENTRY_MOVE_AWAY_PCT:-0.015}
      STALE_ENTRY_MIN_AGE_SEC: ${STALE_ENTRY_MIN_AGE_SEC:-3}
      ENTRY_MAKER_TICKS: ${ENTRY_MAKER_TICKS:-2}
      VOL_MULTIPLIER_CAP: ${VOL_MULTIPLIER_CAP:-2.0}
      PENDING_VOL_REPRICE_DELTA: ${PENDING_VOL_REPRICE_DELTA:-0.5}
      MIN_SL_PCT: ${MIN_SL_PCT:-0.003}
      MAX_SL_PCT: ${MAX_SL_PCT:-0.012}
      MIN_TP_PCT: ${MIN_TP_PCT:-0.002}
      MAX_TP_PCT: ${MAX_TP_PCT:-0.008}
      FEE_BREAKEVEN_PCT: ${FEE_BREAKEVEN_PCT:-0.0015}
      TP_BUDGET_PCT: ${TP_BUDGET_PCT:-0.35}
      EXIT_GRID_MIN_REDEPLOY_SEC: ${EXIT_GRID_MIN_REDEPLOY_SEC:-15}
      MIN_HOLD_TIME_SEC: ${MIN_HOLD_TIME_SEC:-0}
      DECAY_MIN_HOLD_SEC: ${DECAY_MIN_HOLD_SEC:-0}
      SHADOW_MODE: ${SHADOW_MODE:-false}
      SHADOW_ALWAYS_ENABLED: ${SHADOW_ALWAYS_ENABLED:-false}
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN:-ftg-super-secret-token-change-me}
      INFLUX_ORG: ${INFLUX_ORG:-fasttrader}
      INFLUX_BUCKET_RAW: ${INFLUX_BUCKET_RAW:-market_raw}
      METRICS_ADDR: ":9102"
    depends_on:
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      ml_engine:
        condition: service_started
    cpuset: "2"
    networks:
      - ftg-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: ftg-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${FTG_PROMETHEUS_PORT:-19090}:9090"
    networks:
      - ftg-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ftg-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${FTG_GRAFANA_PORT:-13000}:3000"
    depends_on:
      - prometheus
      - influxdb
    networks:
      - ftg-net
    restart: unless-stopped

volumes:
  ml_data:
  ml_models:
  grafana_data:
  influx_data:
  influx_config:

networks:
  ftg-net:
    driver: bridge
