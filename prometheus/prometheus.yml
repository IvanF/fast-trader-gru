global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: screener
    static_configs:
      - targets: ["screener:9100"]

  - job_name: data_ingestion
    static_configs:
      - targets: ["data_ingestion:9101"]

  - job_name: oms_execution
    static_configs:
      - targets: ["oms_execution:9102"]

  - job_name: ml_engine
    static_configs:
      - targets: ["ml_engine:9103"]

  - job_name: history_logger
    static_configs:
      - targets: ["history_logger:9104"]
